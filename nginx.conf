# Nginx config for Weaviate Manager SPA
# - serves the Vite build output
# - SPA fallback so client-side routing works
# - gzip compression for JS/CSS/JSON/SVG
# - aggressive cache for hashed assets, no-cache for index.html

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---------- security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ---------- hashed static assets (long cache) ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached — users always get the latest build
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- deny dotfiles ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
